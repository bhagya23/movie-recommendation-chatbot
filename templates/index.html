<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1.1rem;
        }

        /* Main content */
        .main-content {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        /* Chat section */
        .chat-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(233, 69, 96, 0.1);
            border-bottom: 1px solid rgba(233, 69, 96, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header i {
            font-size: 1.5rem;
            color: #e94560;
        }

        .chat-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 10px;
        }

        /* Message bubbles */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .bot-message {
            align-self: flex-start;
            background: linear-gradient(135deg, #1e3a5f, #16213e);
            color: #e0e0e0;
            border-radius: 18px 18px 18px 4px;
            border-left: 3px solid #e94560;
            box-shadow: 0 4px 15px rgba(30, 58, 95, 0.3);
        }

        .bot-avatar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .bot-avatar i {
            font-size: 1.2rem;
            color: #e94560;
        }

        .bot-avatar span {
            font-weight: 600;
            color: #f5a623;
        }

        /* Input area */
        .chat-input {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(233, 69, 96, 0.3);
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.5);
            border-radius: 25px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input input:focus {
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        .chat-input input::placeholder {
            color: #888;
        }

        .chat-input button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #e94560, #c0392b);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-input button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Recommendations section */
        .recommendations-section {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .recommendations-header {
            padding: 15px 20px;
            background: rgba(233, 69, 96, 0.1);
            border-bottom: 1px solid rgba(233, 69, 96, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recommendations-header i {
            font-size: 1.5rem;
            color: #e94560;
        }

        .recommendations-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .recommendations-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .recommendations-list::-webkit-scrollbar {
            width: 8px;
        }

        .recommendations-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .recommendations-list::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 10px;
        }

        /* Movie cards */
        .movie-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
            border-color: #e94560;
        }

        .movie-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f5a623;
            margin-bottom: 10px;
        }

        .movie-poster {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .imdb-badge {
            background: #f5c518;
            color: #000;
        }

        .genre-badge {
            background: #e94560;
            color: white;
        }

        .year-badge {
            background: #1e3a5f;
            color: #e0e0e0;
            border: 1px solid #3a7bd5;
        }

        .language-badge {
            background: #27ae60;
            color: white;
        }

        .movie-overview {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.5;
            font-style: italic;
        }

        .movie-cast {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
        }

        /* Loading animation */
        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Typing animation */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #e94560;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Explanation box */
        .explanation {
            background: rgba(245, 166, 35, 0.1);
            border-left: 3px solid #f5a623;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #f5a623;
        }

        /* Confidence indicator */
        .confidence {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .chat-section, .recommendations-section {
                flex: none;
                height: 50%;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .message {
                max-width: 90%;
            }
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            text-align: center;
            padding: 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #e94560;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ app_title }}</h1>
            <p>{{ app_subtitle }}</p>
        </div>

        <div class="main-content">
            <div class="chat-section">
                <div class="chat-header">
                    <i class="fas fa-comments"></i>
                    <h2>Chat with {{ chatbot_name }}</h2>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        <div class="bot-avatar">
                            <i class="fas fa-robot"></i>
                            <span>{{ chatbot_name }}</span>
                        </div>
                        <div>Hello! I'm {{ chatbot_name }} 🎬 — your Bollywood movie guide. Ask me for recommendations by genre, mood, actor, or year!</div>
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="userInput" placeholder="Ask me about Bollywood movies..." autocomplete="off">
                    <button id="sendBtn">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>

            <div class="recommendations-section">
                <div class="recommendations-header">
                    <i class="fas fa-film"></i>
                    <h2>Movie Recommendations</h2>
                </div>
                <div class="recommendations-list" id="recommendationsList">
                    <div class="empty-state">
                        <i class="fas fa-popcorn"></i>
                        <p>Start chatting to get movie recommendations!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const recommendationsList = document.getElementById('recommendationsList');

        let isLoading = false;

        // Add message to chat
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (!isUser) {
                messageDiv.innerHTML = `
                    <div class="bot-avatar">
                        <i class="fas fa-robot"></i>
                        <span>{{ chatbot_name }}</span>
                    </div>
                    <div>${content}</div>
                `;
            } else {
                messageDiv.textContent = content;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Add typing indicator
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // Display movie recommendations
        function displayRecommendations(movies, explanation) {
            recommendationsList.innerHTML = '';
            
            if (explanation) {
                const explanationDiv = document.createElement('div');
                explanationDiv.className = 'explanation';
                explanationDiv.innerHTML = `<i class="fas fa-lightbulb"></i> ${explanation}`;
                recommendationsList.appendChild(explanationDiv);
            }
            
            if (movies.length === 0) {
                recommendationsList.innerHTML += `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>No movies found matching your criteria.</p>
                    </div>
                `;
                return;
            }
            
            movies.forEach((movie, index) => {
                const movieCard = document.createElement('div');
                movieCard.className = 'movie-card';
                movieCard.style.animationDelay = `${index * 0.1}s`;

                const description = movie.description
                    ? (movie.description.length > 180 ? movie.description.substring(0, 180) + '...' : movie.description)
                    : '';
                const moods = Array.isArray(movie.mood) ? movie.mood.slice(0, 3).join(', ') : '';
                const ageGroups = Array.isArray(movie.age_group) ? movie.age_group.join(', ') : '';
                const poster = movie.poster
                    ? `<img class="movie-poster" src="${movie.poster}" alt="${movie.title}" onerror="this.style.display='none'">`
                    : '';

                movieCard.innerHTML = `
                    <div class="movie-title">${index + 1}. ${movie.title}</div>
                    ${poster}
                    <div class="movie-meta">
                        <span class="badge imdb-badge"><i class="fas fa-star"></i> IMDb ${movie.imdb}</span>
                        <span class="badge genre-badge">${movie.genre}</span>
                        <span class="badge year-badge"><i class="fas fa-calendar"></i> ${movie.year}</span>
                        <span class="badge language-badge"><i class="fas fa-globe"></i> ${movie.language}</span>
                    </div>
                    ${moods ? `<div class="movie-cast"><i class="fas fa-face-smile"></i> ${moods}</div>` : ''}
                    ${ageGroups ? `<div class="movie-cast"><i class="fas fa-user-group"></i> ${ageGroups}</div>` : ''}
                    ${description ? `<div class="movie-overview">"${description}"</div>` : ''}
                `;

                recommendationsList.appendChild(movieCard);
            });
        }

        // Send message
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isLoading) return;
            
            isLoading = true;
            sendBtn.disabled = true;
            
            // Add user message
            addMessage(message, true);
            userInput.value = '';
            
            // Add typing indicator
            addTypingIndicator();
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: message,
                        n_recommendations: 5
                    })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                removeTypingIndicator();
                
                if (data.error) {
                    addMessage(`Error: ${data.error}`);
                } else {
                    // Add bot response
                    addMessage(data.response);
                    
                    // Display confidence
                    if (data.confidence !== undefined) {
                        const confidenceDiv = document.createElement('div');
                        confidenceDiv.className = 'confidence';
                        confidenceDiv.textContent = `Intent: ${data.intent} | Confidence: ${(data.confidence * 100).toFixed(1)}%`;
                        chatMessages.appendChild(confidenceDiv);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    }
                    
                    // Display recommendations
                    displayRecommendations(data.movies || [], data.explanation || '');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage(`Error: ${error.message}`);
            }
            
            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        userInput.focus();
    </script>
</body>
</html>
